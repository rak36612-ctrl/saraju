<!DOCTYPE html>
<html lang="kn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Saru ❤️ 1 Year Anniversary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Kannada:wght@300;400;600;700;900&family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  :root {
    --pink: #ff4d8f;
    --rose: #ff1a6c;
    --deep: #c0005a;
    --blush: #ffe0ec;
    --lilac: #f5c6d8;
    --gold: #ffd700;
    --white: #fff5f8;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;overflow-x:hidden;background:#1a0010;font-family:'Noto Sans Kannada',sans-serif;}
  
  /* ========= LANG TOGGLE ========= */
  #lang-toggle{
    position:fixed;top:12px;right:12px;z-index:9999;
    background:rgba(255,255,255,0.15);backdrop-filter:blur(10px);
    border:1.5px solid rgba(255,100,150,0.6);
    border-radius:50px;padding:6px 14px;
    font-size:11px;font-weight:700;color:#fff;
    letter-spacing:1px;cursor:pointer;
    transition:all .3s;font-family:'Playfair Display',serif;
    box-shadow:0 0 15px rgba(255,80,130,0.4);
  }
  #lang-toggle:hover{background:rgba(255,80,130,0.3);transform:scale(1.05);}
  #lang-toggle span.active{color:#ffd700;text-shadow:0 0 8px #ffd700;}

  /* ========= FLOATING PETALS ========= */
  .petal{
    position:fixed;top:-60px;pointer-events:none;z-index:1;
    font-size:18px;animation:petalFall linear infinite;opacity:.8;
  }
  @keyframes petalFall{
    0%{transform:translateY(-60px) rotate(0deg) translateX(0);}
    50%{transform:translateY(50vh) rotate(180deg) translateX(30px);}
    100%{transform:translateY(110vh) rotate(360deg) translateX(-20px);}
  }
  .sparkle{
    position:fixed;pointer-events:none;z-index:1;
    width:4px;height:4px;border-radius:50%;
    background:#ffd700;box-shadow:0 0 6px #ffd700;
    animation:sparkleFade ease-in-out infinite;
  }
  @keyframes sparkleFade{
    0%,100%{opacity:0;transform:scale(0);}
    50%{opacity:1;transform:scale(1);}
  }

  /* ========= SECTIONS ========= */
  .section{
    min-height:100vh;width:100%;position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:80px 20px 40px;overflow:hidden;
  }
  .section-hidden{display:none;}

  /* ========= GRADIENT BACKGROUNDS ========= */
  #s-intro{background:radial-gradient(ellipse at 50% 30%,#3d0030 0%,#1a0010 60%,#0d0008 100%);}

  #s-hearts{background:radial-gradient(ellipse at 50% 40%,#2a001a 0%,#100008 100%);}
  #s-gallery{background:radial-gradient(ellipse at 50% 20%,#200025 0%,#0a000d 100%);}
  #s-letter{background:radial-gradient(ellipse at 50% 30%,#28001a 0%,#0f0008 100%);}
  #s-poem{background:radial-gradient(ellipse at 50% 30%,#1a0020 0%,#080010 100%);}
  #s-final{background:radial-gradient(ellipse at 50% 40%,#350020 0%,#1a0010 100%);}

  /* ========= GLOW TEXT ========= */
  .glow-title{
    font-family:'Dancing Script',cursive;
    font-size:clamp(2rem,8vw,3.5rem);
    color:#fff;text-align:center;
    text-shadow:0 0 20px #ff4d8f,0 0 40px #ff1a6c,0 0 60px #ff1a6c;
    line-height:1.3;animation:titlePulse 2s ease-in-out infinite;
  }
  @keyframes titlePulse{
    0%,100%{text-shadow:0 0 20px #ff4d8f,0 0 40px #ff1a6c;}
    50%{text-shadow:0 0 30px #ff4d8f,0 0 60px #ff1a6c,0 0 80px #ff8cba;}
  }
  .sub-text{
    color:rgba(255,200,220,0.9);font-size:clamp(1rem,4vw,1.3rem);
    text-align:center;margin:16px 0;line-height:1.6;
    font-family:'Noto Sans Kannada',sans-serif;
  }

  /* ========= BUTTONS ========= */
  .love-btn{
    background:linear-gradient(135deg,#ff1a6c,#ff4d8f,#ff80ab);
    border:none;color:#fff;font-size:clamp(1rem,4vw,1.2rem);
    padding:16px 36px;border-radius:50px;cursor:pointer;
    font-family:'Noto Sans Kannada',sans-serif;font-weight:700;
    box-shadow:0 0 30px rgba(255,80,130,0.7),0 4px 20px rgba(0,0,0,0.4);
    transition:all .3s;letter-spacing:.5px;margin-top:20px;
    position:relative;overflow:hidden;
  }
  .love-btn::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,0.3) 50%,transparent 70%);
    transform:translateX(-100%);transition:transform .5s;
  }
  .love-btn:hover::after,.love-btn:active::after{transform:translateX(100%);}
  .love-btn:active{transform:scale(0.96);}

  /* ========= HEART PARTICLES CANVAS ========= */
  #heartCanvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}

  /* ========= INTRO PAGE ========= */
  .intro-heart{
    font-size:80px;animation:heartbeat 1.2s ease-in-out infinite;
    display:block;text-align:center;filter:drop-shadow(0 0 20px #ff1a6c);
  }
  @keyframes heartbeat{
    0%,100%{transform:scale(1);}
    14%{transform:scale(1.15);}
    28%{transform:scale(1);}
    42%{transform:scale(1.1);}
    70%{transform:scale(1);}
  }
  .typing-text{
    font-size:clamp(1.1rem,4.5vw,1.4rem);color:#ffe0ec;
    text-align:center;font-family:'Noto Sans Kannada',sans-serif;
    min-height:3em;line-height:1.7;
  }
  .cursor{animation:blink .7s step-end infinite;color:#ff4d8f;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

  /* ========= SECTION HEADER ========= */
  .sec-header{
    background:linear-gradient(135deg,rgba(255,26,108,0.2),rgba(255,77,143,0.1));
    border:1px solid rgba(255,100,150,0.3);border-radius:20px;
    padding:16px 24px;text-align:center;margin-bottom:24px;width:100%;max-width:400px;
    backdrop-filter:blur(10px);
  }
  .sec-title{
    font-family:'Dancing Script',cursive;font-size:clamp(1.8rem,7vw,2.5rem);
    color:#ff8cba;text-shadow:0 0 15px rgba(255,140,186,0.8);
  }
  .sec-num{font-size:0.75rem;color:rgba(255,200,220,0.6);letter-spacing:2px;text-transform:uppercase;}



  /* ========= HEARTS GAME ========= */
  #hearts-canvas-area{
    position:relative;width:100%;height:65vh;overflow:hidden;
    border-radius:20px;background:rgba(0,0,0,0.3);
    border:1px solid rgba(255,80,130,0.25);
  }
  .float-heart{
    position:absolute;font-size:clamp(28px,8vw,42px);cursor:pointer;
    animation:floatUp linear;user-select:none;
    filter:drop-shadow(0 0 8px rgba(255,26,108,0.8));
    transition:transform .1s;
  }
  .float-heart:active{transform:scale(0.8);}
  @keyframes floatUp{
    0%{opacity:1;transform:translateY(0) scale(1) rotate(-10deg);}
    100%{opacity:0;transform:translateY(-110%) scale(0.6) rotate(15deg);}
  }
  .heart-msg-popup{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
    background:linear-gradient(135deg,rgba(255,26,108,0.95),rgba(200,0,90,0.95));
    color:#fff;padding:20px 28px;border-radius:20px;
    font-size:clamp(1rem,4vw,1.2rem);text-align:center;
    box-shadow:0 0 40px rgba(255,80,130,0.8);z-index:1000;
    max-width:280px;width:90%;font-family:'Noto Sans Kannada',sans-serif;
    transition:transform .3s cubic-bezier(0.34,1.56,0.64,1),opacity .3s;
    pointer-events:none;opacity:0;
  }
  .heart-msg-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
  #hearts-score{
    color:#ff8cba;font-size:1rem;text-align:center;
    margin:12px 0;font-weight:600;
  }
  #start-hearts-btn{margin:0 auto;display:block;}

  /* ========= GALLERY ========= */
  .gallery-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
    width:100%;max-width:420px;
  }
  .gallery-item{
    aspect-ratio:1;border-radius:12px;overflow:hidden;cursor:pointer;
    position:relative;border:2px solid rgba(255,80,130,0.3);
    box-shadow:0 0 15px rgba(255,26,108,0.3);
    transition:all .3s;animation:galleryPop .5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  .gallery-item:nth-child(1){animation-delay:.05s;}
  .gallery-item:nth-child(2){animation-delay:.1s;}
  .gallery-item:nth-child(3){animation-delay:.15s;}
  .gallery-item:nth-child(4){animation-delay:.2s;}
  .gallery-item:nth-child(5){animation-delay:.25s;}
  .gallery-item:nth-child(6){animation-delay:.3s;}
  .gallery-item:nth-child(7){animation-delay:.35s;}
  .gallery-item:nth-child(8){animation-delay:.4s;}
  .gallery-item:nth-child(9){animation-delay:.45s;}
  @keyframes galleryPop{0%{transform:scale(0);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
  .gallery-item:active img{transform:scale(1.1);}
  .gallery-item::after{
    content:'❤️';position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:24px;background:rgba(255,26,108,0);
    transition:all .3s;opacity:0;
  }
  .gallery-item:active::after{background:rgba(255,26,108,0.3);opacity:1;}
  .gallery-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:2000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:20px;opacity:0;pointer-events:none;transition:opacity .4s;
  }
  .gallery-overlay.open{opacity:1;pointer-events:all;}
  .gallery-overlay img{
    max-width:100%;max-height:60vh;border-radius:16px;
    border:3px solid rgba(255,80,130,0.6);
    box-shadow:0 0 40px rgba(255,26,108,0.5);
    animation:zoomIn .4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes zoomIn{0%{transform:scale(0.5);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .gallery-caption{
    color:#ffe0ec;font-size:1.1rem;text-align:center;margin-top:16px;
    font-family:'Dancing Script',cursive;font-size:1.4rem;
    text-shadow:0 0 10px rgba(255,140,186,0.6);
  }
  .gallery-close{
    position:absolute;top:16px;right:16px;background:rgba(255,80,130,0.3);
    border:none;color:#fff;width:40px;height:40px;border-radius:50%;
    font-size:18px;cursor:pointer;
  }
  .gallery-back-btn{
    margin-top:20px;background:linear-gradient(135deg,#ff1a6c,#ff4d8f);
    border:none;color:#fff;font-size:1rem;padding:13px 36px;
    border-radius:50px;cursor:pointer;font-family:'Noto Sans Kannada',sans-serif;
    font-weight:700;box-shadow:0 0 20px rgba(255,80,130,0.6);
    letter-spacing:.5px;
  }

  /* ========= LOVE LETTER ========= */
  .letter-paper{
    width:100%;max-width:420px;
    background:linear-gradient(160deg,rgba(255,240,248,0.06),rgba(255,200,220,0.04));
    border:1px solid rgba(255,150,190,0.25);border-radius:20px;
    padding:32px 24px;position:relative;
    box-shadow:0 0 40px rgba(255,26,108,0.2);
  }
  .letter-paper::before{
    content:'❤';position:absolute;top:-16px;left:50%;transform:translateX(-50%);
    font-size:32px;filter:drop-shadow(0 0 12px #ff1a6c);
  }
  .letter-salutation{
    font-family:'Dancing Script',cursive;font-size:clamp(1.6rem,6vw,2.2rem);
    color:#ff8cba;text-shadow:0 0 10px rgba(255,140,186,0.5);margin-bottom:12px;
  }
  .letter-body{
    color:rgba(255,230,240,0.9);font-size:clamp(0.95rem,3.8vw,1.1rem);
    line-height:1.9;font-family:'Noto Sans Kannada',sans-serif;
  }
  .letter-sign{
    font-family:'Dancing Script',cursive;font-size:clamp(1.3rem,5vw,1.8rem);
    color:#ffd700;text-align:right;margin-top:20px;
    text-shadow:0 0 10px rgba(255,215,0,0.4);
  }

  /* ========= POEM ========= */
  .poem-container{
    width:100%;max-width:420px;text-align:center;
    background:linear-gradient(160deg,rgba(120,0,80,0.2),rgba(60,0,40,0.2));
    border:1px solid rgba(255,100,150,0.3);border-radius:24px;
    padding:32px 20px;box-shadow:0 0 40px rgba(255,26,108,0.25);
    position:relative;overflow:hidden;
  }
  .poem-container::before,.poem-container::after{
    content:'🌹';position:absolute;font-size:60px;opacity:.1;
  }
  .poem-container::before{top:-10px;left:-10px;transform:rotate(-30deg);}
  .poem-container::after{bottom:-10px;right:-10px;transform:rotate(30deg);}
  .poem-line{
    font-size:clamp(1rem,4vw,1.2rem);color:#ffe0ec;
    margin:8px 0;line-height:1.8;
    font-family:'Noto Sans Kannada',sans-serif;
    animation:fadeSlideUp .6s ease both;
  }
  @keyframes fadeSlideUp{0%{opacity:0;transform:translateY(20px);}100%{opacity:1;transform:translateY(0);}}

  /* ========= FINAL SCREEN ========= */
  .final-heart-big{
    font-size:100px;animation:heartbeat 1s ease-in-out infinite;
    filter:drop-shadow(0 0 30px #ff1a6c);display:block;text-align:center;
    margin-bottom:16px;
  }
  .final-title{
    font-family:'Dancing Script',cursive;
    font-size:clamp(2.2rem,9vw,4rem);
    background:linear-gradient(135deg,#ff8cba,#ffd700,#ff4d8f);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;
    background-clip:text;text-align:center;
    text-shadow:none;animation:shimmer 3s linear infinite;
    background-size:200% auto;
  }
  @keyframes shimmer{0%{background-position:0% center;}100%{background-position:200% center;}}
  .final-sub{
    color:rgba(255,210,230,0.9);font-size:clamp(1rem,4vw,1.2rem);
    text-align:center;margin-top:12px;line-height:1.7;
  }
  #rose-container{
    position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;
  }
  .falling-rose{
    position:absolute;font-size:clamp(20px,5vw,30px);
    animation:roseFall linear;top:-50px;
  }
  @keyframes roseFall{
    0%{transform:translateY(0) rotate(0deg);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0;}
  }
  .secret-btn{
    background:rgba(255,215,0,0.15);border:2px dashed rgba(255,215,0,0.4);
    color:#ffd700;padding:14px 28px;border-radius:50px;cursor:pointer;
    font-size:0.9rem;font-family:'Noto Sans Kannada',sans-serif;
    transition:all .3s;margin-top:16px;
  }
  .secret-btn:active{transform:scale(0.95);}
  #secret-modal{
    position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:5000;
    display:flex;align-items:center;justify-content:center;flex-direction:column;
    padding:24px;opacity:0;pointer-events:none;transition:opacity .5s;
  }
  #secret-modal.open{opacity:1;pointer-events:all;}
  .secret-content{
    background:linear-gradient(135deg,rgba(255,26,108,0.2),rgba(200,0,90,0.15));
    border:2px solid rgba(255,215,0,0.4);border-radius:24px;
    padding:36px 28px;text-align:center;max-width:340px;
    box-shadow:0 0 60px rgba(255,26,108,0.5);
    animation:popIn .6s cubic-bezier(0.34,1.56,0.64,1);
  }
  .secret-close{
    position:absolute;top:16px;right:16px;background:none;border:none;
    color:rgba(255,200,220,0.6);font-size:24px;cursor:pointer;
  }

  /* ========= PROGRESS DOTS NAV ========= */
  #nav-dots{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    z-index:9998;display:flex;gap:8px;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(8px);
    padding:8px 14px;border-radius:50px;
    border:1px solid rgba(255,80,130,0.2);
  }
  .nav-dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(255,80,130,0.3);border:1px solid rgba(255,80,130,0.5);
    cursor:pointer;transition:all .3s;
  }
  .nav-dot.active{background:#ff4d8f;box-shadow:0 0 8px rgba(255,77,143,0.8);width:20px;border-radius:4px;}

  /* ========= NEXT BUTTON ========= */
  .next-btn{
    background:linear-gradient(135deg,rgba(255,26,108,0.3),rgba(255,80,130,0.2));
    border:1.5px solid rgba(255,80,130,0.5);color:#ff8cba;
    padding:12px 28px;border-radius:50px;cursor:pointer;
    font-size:0.95rem;font-family:'Noto Sans Kannada',sans-serif;
    margin-top:20px;transition:all .3s;
  }
  .next-btn:active{transform:scale(0.95);}

  /* ========= TRANSITIONS ========= */
  .section{
    transition:opacity .5s, transform .5s;
  }
  .section.fade-enter{animation:fadeIn .7s ease both;}
  @keyframes fadeIn{0%{opacity:0;transform:translateY(30px);}100%{opacity:1;transform:translateY(0);}}

  /* ========= MUSIC BTN ========= */
  #music-btn{
    position:fixed;bottom:70px;right:16px;z-index:9998;
    background:rgba(255,80,130,0.2);border:1.5px solid rgba(255,80,130,0.5);
    color:#ff8cba;width:44px;height:44px;border-radius:50%;
    font-size:18px;cursor:pointer;backdrop-filter:blur(8px);
    transition:all .3s;
  }
  #music-btn:active{transform:scale(0.9);}
  #music-btn.playing{color:#ffd700;border-color:rgba(255,215,0,0.6);
    box-shadow:0 0 15px rgba(255,215,0,0.4);}

  /* ========= RESPONSIVE ADJUSTMENTS ========= */
  @media(max-width:360px){
    .glow-title{font-size:1.8rem;}
    .gallery-grid{grid-template-columns:repeat(3,1fr);gap:5px;}
  }

  /* Confetti */
  .confetti-piece{
    position:fixed;pointer-events:none;z-index:9999;
    width:8px;height:8px;border-radius:2px;
    animation:confettiFall linear both;
  }
  @keyframes confettiFall{
    0%{opacity:1;transform:translateY(-20px) rotate(0deg) scale(1);}
    100%{opacity:0;transform:translateY(100vh) rotate(720deg) scale(0.5);}
  }

  /* Lang animation */
  .lang-transition{animation:langFade .4s ease both;}
  @keyframes langFade{0%{opacity:0;transform:translateY(-5px);}100%{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<!-- Language Toggle -->
<button id="lang-toggle" onclick="toggleLang()">
  <span id="kn-label" class="active">ಕನ್ನಡ</span>
  <span style="color:rgba(255,200,220,0.5);margin:0 4px;">|</span>
  <span id="en-label">ENGLISH</span>
</button>

<!-- Music Button -->
<button id="music-btn" onclick="toggleMusic()" title="Music">🎵</button>

<!-- Hidden YouTube Music Player (Nee Amrithadhare - Mungaru Male) -->
<div style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
  <div id="yt-music-player"></div>
</div>

<!-- Heart Canvas -->
<canvas id="heartCanvas"></canvas>

<!-- Navigation Dots -->
<div id="nav-dots">
  <div class="nav-dot active" onclick="goToSection(0)"></div>
  <div class="nav-dot" onclick="goToSection(1)"></div>
  <div class="nav-dot" onclick="goToSection(2)"></div>
  <div class="nav-dot" onclick="goToSection(3)"></div>
  <div class="nav-dot" onclick="goToSection(4)"></div>
  <div class="nav-dot" onclick="goToSection(5)"></div>
</div>

<!-- Rose Container for Final -->
<div id="rose-container"></div>

<!-- Heart Message Popup -->
<div class="heart-msg-popup" id="heartMsgPopup"></div>

<!-- Gallery Overlay -->
<div class="gallery-overlay" id="galleryOverlay">
  <button class="gallery-close" onclick="closeGallery()">✕</button>
  <img id="galleryImg" src="" alt="">
  <p class="gallery-caption" id="galleryCaption"></p>
  <button class="gallery-back-btn" onclick="closeGallery()">← Back to Gallery</button>
</div>

<!-- Secret Modal -->
<div id="secret-modal">
  <button class="secret-close" onclick="closeSecret()">✕</button>
  <div class="secret-content">
    <div style="font-size:60px;margin-bottom:16px;animation:heartbeat 1s infinite;">💍</div>
    <h2 style="font-family:'Dancing Script',cursive;font-size:2rem;color:#ffd700;text-shadow:0 0 15px rgba(255,215,0,0.5);margin-bottom:16px;" id="secret-title"></h2>
    <p style="color:rgba(255,220,235,0.9);font-size:1.05rem;line-height:1.8;font-family:'Noto Sans Kannada',sans-serif;" id="secret-body"></p>
    <div style="font-size:40px;margin-top:20px;animation:heartbeat 1.2s infinite;">❤️🌹❤️</div>
  </div>
</div>


<!-- ===================== SECTION 1: INTRO ===================== -->
<section class="section" id="s-intro">
  <span class="intro-heart">❤️</span>
  <h1 class="glow-title" id="intro-title" style="margin:20px 0 10px;"></h1>
  <p class="typing-text" id="typing-area"></p>
  <button class="love-btn" id="start-btn" onclick="startJourney()" style="display:none;">
    <span id="start-btn-text">Start Our Love Journey 💕</span>

function goToSection(idx) {
  if (idx < 0 || idx >= sectionIds.length) return;
  const prev = document.getElementById(sectionIds[currentSection]);
  if (prev) {
    prev.classList.add('section-hidden');
    prev.classList.remove('fade-enter');
  }
  currentSection = idx;
  const next = document.getElementById(sectionIds[currentSection]);
  if (next) {
    next.classList.remove('section-hidden');
    next.classList.add('fade-enter');
  }
  // Update nav dots
  document.querySelectorAll('.nav-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i === currentSection);
  });
  window.scrollTo(0, 0);

  // Trigger section-specific init
  if (idx === 2) initGallery();
  if (idx === 3) initLetter();
  if (idx === 4) initPoem();
  if (idx === 5) initFinal();
}

function typeText(elId, text, callback) {
  const el = document.getElementById(elId);
  el.innerHTML = '<span class="cursor">|</span>';
  let i = 0;
  const lines = text.split('\n');
  let lineIdx = 0;
  let charIdx = 0;
  let rendered = '';

  function tick() {
    if (lineIdx >= lines.length) {
      el.innerHTML = rendered + '<span class="cursor">|</span>';
      if (callback) callback();
      return;
    }
    if (charIdx < lines[lineIdx].length) {
      rendered += lines[lineIdx][charIdx];
      charIdx++;
    } else {
      if (lineIdx < lines.length - 1) {
        rendered += '<br>';
        lineIdx++;
        charIdx = 0;
        typingTimeout = setTimeout(tick, 300);
        return;
      } else {
        lineIdx++;
      }
    }
    el.innerHTML = rendered + '<span class="cursor">|</span>';
    typingTimeout = setTimeout(tick, 40);
  }
  tick();
}

function initQuiz() {

function renderQuizProgress() {
  const data = quizData[lang.current];

    const dot = document.createElement('div');

}

function renderQuizQuestion() {
  const data = quizData[lang.current];
  if (quizIdx >= data.length) {
    showQuizFinal();
    return;
  }
  const q = data[quizIdx];
  document.getElementById('quiz-question').textContent = q.q;
  document.getElementById('quiz-result').textContent = '';
  const optsEl = document.getElementById('quiz-options');
  optsEl.innerHTML = '';
  quizAnswered = false;
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = opt;
    btn.onclick = () => handleQuizAnswer(i, q.ans);
    optsEl.appendChild(btn);
  });
}

function handleQuizAnswer(selected, correct) {
  if (quizAnswered) return;
  quizAnswered = true;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((btn, i) => {
    btn.onclick = null;
    if (i === correct) btn.classList.add('correct');
    if (i === selected && selected !== correct) btn.classList.add('wrong');
  });
  let resultMsg = '';
  if (selected === correct) {
    quizCorrect++;
    resultMsg = ['💝 ಸರಿ!','✨ ಬ್ರಿಲಿಯಂಟ್!','🌹 ವಾಹ್!','💕 ಅದ್ಭುತ!'][Math.floor(Math.random()*4)];
    if (lang.current === 'en') resultMsg = ['💝 Correct!','✨ Brilliant!','🌹 Wow!','💕 Amazing!'][Math.floor(Math.random()*4)];
  } else {
    resultMsg = lang.current === 'kn' ? '💭 ಪರವಾಗಿಲ್ಲ..' : '💭 Close enough..';
  }
  document.getElementById('quiz-result').textContent = resultMsg;
  document.querySelectorAll('.q-dot').forEach((d,i) => { if(i<=quizIdx) d.classList.add('done'); });

  setTimeout(() => {
    quizIdx++;
    renderQuizProgress();
    if (quizIdx < quizData[lang.current].length) {
      renderQuizQuestion();
    } else {
      showQuizFinal();
    }
  }, 1500);
}

function updateHeartsScore() {

function startHeartsGame() {
  heartScore = 0;
  heartGameActive = true;
  updateHeartsScore();
  document.getElementById('start-hearts-btn').style.display = 'none';

  const area = document.getElementById('hearts-canvas-area');
  area.innerHTML = '';

  let timeLeft = 30;
  const timerEl = document.createElement('div');
  timerEl.style.cssText = 'position:absolute;top:8px;right:12px;color:rgba(255,200,220,0.7);font-size:0.85rem;font-weight:bold;z-index:2;';
  timerEl.textContent = '⏱ 30s';
  area.appendChild(timerEl);

  heartGameInterval = setInterval(() => {
    if (!heartGameActive) return;
    spawnHeart(area);
  }, 800);

  heartGameTimer = setInterval(() => {
    timeLeft--;
    timerEl.textContent = `⏱ ${timeLeft}s`;
    if (timeLeft <= 0) endHeartsGame(area, timerEl);
  }, 1000);
}

function spawnHeart(area) {
  const heart = document.createElement('div');
  heart.className = 'float-heart';
  const emojis = ['❤️','💕','💝','💖','💗','💓','🌹','✨'];
  heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  const duration = 3 + Math.random() * 3;
  const left = 5 + Math.random() * 85;
  heart.style.cssText = `left:${left}%;bottom:0;animation-duration:${duration}s;`;
  heart.onclick = () => {
    if (!heartGameActive) return;
    heartScore++;
    updateHeartsScore();
    const msgs = heartMessages[lang.current];
    const msg = msgs[Math.floor(Math.random() * msgs.length)];
    showHeartMessage(msg);
    heart.style.transform = 'scale(2) rotate(20deg)';
    heart.style.opacity = '0';
    setTimeout(() => heart.remove(), 300);
    spawnConfetti();
  };
  area.appendChild(heart);
  setTimeout(() => { if(heart.parentElement) heart.remove(); }, duration * 1000);
}

function showHeartMessage(msg) {
  const popup = document.getElementById('heartMsgPopup');
  popup.textContent = msg;
  popup.classList.add('show');
  clearTimeout(popup._timeout);
  popup._timeout = setTimeout(() => popup.classList.remove('show'), 1800);
}

function endHeartsGame(area, timerEl) {
  heartGameActive = false;
  clearInterval(heartGameInterval);
  clearInterval(heartGameTimer);
  timerEl.textContent = '⏱ Done!';
  const msg = document.createElement('div');
  msg.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,0.7);border-radius:20px;z-index:10;';

    <p style="color:#ffd700;font-family:'Dancing Script',cursive;font-size:1.6rem;text-align:center;padding:0 20px;">${t('heartsGameOver',heartScore)}</p>`;
  area.appendChild(msg);
  document.getElementById('hearts-next-btn').style.display = '';
  for (let i = 0; i < 30; i++) setTimeout(() => spawnConfetti(), i * 70);
}

// ============================================================
//  HEART CANVAS ANIMATION
// ============================================================
(function() {
  const canvas = document.getElementById('heartCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  function createParticle() {
    return {
      x: Math.random() * canvas.width,
      y: canvas.height + 20,
      size: 6 + Math.random() * 10,
      speedY: 0.4 + Math.random() * 0.8,
      speedX: (Math.random() - 0.5) * 0.5,
      opacity: 0.3 + Math.random() * 0.4,
      r: Math.floor(200 + Math.random() * 55),
      g: Math.floor(20 + Math.random() * 60),
      b: Math.floor(80 + Math.random() * 80),
    };
  }

  function drawHeart(ctx, x, y, size, opacity, r, g, b) {
    ctx.save();
    ctx.globalAlpha = opacity;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.bezierCurveTo(x, y - size*0.3, x - size*0.5, y - size*0.6, x - size*0.5, y - size*0.3);
    ctx.bezierCurveTo(x - size*0.5, y - size*0.7, x, y - size*0.55, x, y - size*0.3);
    ctx.bezierCurveTo(x, y - size*0.55, x + size*0.5, y - size*0.7, x + size*0.5, y - size*0.3);
    ctx.bezierCurveTo(x + size*0.5, y - size*0.6, x, y - size*0.3, x, y);
    ctx.fill();
    ctx.restore();
  }

  function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (particles.length < 18) particles.push(createParticle());
    particles = particles.filter(p => p.y > -30);
    for (const p of particles) {
      p.y -= p.speedY;
      p.x += p.speedX;
      p.opacity = Math.max(0, p.opacity - 0.001);
      drawHeart(ctx, p.x, p.y, p.size, p.opacity, p.r, p.g, p.b);
    }
    requestAnimationFrame(loop);
  }
  loop();
})();

// Video ID for "Nee Amruthaadhare" - Mungaru Male
const YT_SONG_ID = 'N0ZsgA0JMuA';
let ytPlayer = null;
let ytPlayerReady = false;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-music-player', {
    height: '1', width: '1',
    videoId: YT_SONG_ID,
    playerVars: { autoplay: 0, loop: 1, playlist: YT_SONG_ID, controls: 0, disablekb: 1 },
    events: {
      onReady: function() { ytPlayerReady = true; },
      onStateChange: function(e) {
        // Auto-loop
        if (e.data === 0 && musicPlaying) ytPlayer.playVideo();
        // Track playing state
        if (e.data === 1) {
          musicPlaying = true;
          document.getElementById('music-btn').classList.add('playing');
        } else if (e.data === 2 || e.data === 0) {
          if (!musicPlaying) document.getElementById('music-btn').classList.remove('playing');
        }
      },
      onError: function() {
        // Silently fail
        console.log('YouTube music unavailable');
      }
    }
  });
}

function toggleMusic() {
  if (musicPlaying) {
    if (ytPlayer && ytPlayerReady) ytPlayer.pauseVideo();
    musicPlaying = false;
    document.getElementById('music-btn').classList.remove('playing');
  } else {
    if (ytPlayer && ytPlayerReady) {
      ytPlayer.playVideo();
      musicPlaying = true;
      document.getElementById('music-btn').classList.add('playing');
    } else {
      // Player not ready yet, retry
      setTimeout(toggleMusic, 600);
    }
  }
}

function stopMusic() {
  if (ytPlayer && ytPlayerReady) ytPlayer.pauseVideo();
  musicPlaying = false;
  document.getElementById('music-btn').classList.remove('playing');
}
